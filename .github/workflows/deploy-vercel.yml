name: Deploy to Vercel

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --verbose
        timeout-minutes: 5

      - name: Pull Vercel environment info
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN_PROD }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_PROD }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      - name: Build with Vercel
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN_PROD }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_PROD }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      - name: Deploy to Vercel (Preview for PRs)
        if: github.event_name == 'pull_request'
        id: vercel_preview
        run: |
          url=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN_PREVIEW }})
          echo "Preview URL: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_PREVIEW }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PREVIEW }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.vercel_preview.outputs.url }}';
            if (!url) {
              core.setFailed('No preview URL found from Vercel deploy step.');
              return;
            }
            const body = `OK Vercel Preview: ${url}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Deploy to Vercel (Production)
        if: github.event_name == 'push'
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN_PROD }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_PROD }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
